services:
  mc:
    image: itzg/minecraft-server:latest
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      MODE: creative
      ONLINE_MODE: "FALSE"
    volumes:
      - mc_data:/data
    tty: true                              # allocate a pseudo-TTY (keeps server console usable)              
    stdin_open: true                       # keep stdin open for server console commands                      
    restart: unless-stopped                # auto-restart on crash, but not after manual stop       

volumes:
  mc_data: